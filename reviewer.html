<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Panel — Reviewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><span>The</span> Panel</a>
</nav>

<!-- API key bar — shown only when not on hosted Vercel -->
<div class="api-bar" id="apiBar">
  <label for="apiKey">Anthropic API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-…" oninput="saveKey()" />
  <span class="api-status" id="apiStatus">Enter your key to begin</span>
  <a href="https://console.anthropic.com/settings/keys" target="_blank" style="font-size:0.78rem;color:var(--muted);white-space:nowrap">Get a key →</a>
</div>
<!-- Hosted banner — shown only on Vercel -->
<div class="api-bar" id="hostedBanner" style="display:none">
  <span style="color:#4ade80;font-size:0.85rem;font-weight:600">✓ Hosted API active</span>
  <span style="color:var(--muted);font-size:0.82rem">— No key needed. Powered by the server.</span>
</div>

<div class="reviewer-wrap">

  <!-- LEFT: document input -->
  <div class="panel">
    <h2>Your Document</h2>
    <textarea id="docInput" placeholder="Paste your email, essay, pitch, product review, financial model, blog post…" oninput="onDocChange()"></textarea>
    <div class="run-bar">
      <button class="run-btn" id="runAllBtn" onclick="runAll()">Run All Reviewers →</button>
      <button class="clear-btn" onclick="clearAll()">Clear responses</button>
    </div>
    <div id="triggerHints" style="font-size:0.8rem;color:var(--muted);margin-top:0.25rem;min-height:1.2em"></div>
  </div>

  <!-- RIGHT: persona cards -->
  <div class="panel right-panel">
    <h2>Reviewers</h2>
    <div class="personas-list" id="personasList"></div>
    <button class="add-persona-btn" onclick="openModal()">+ Add custom reviewer</button>
  </div>

</div>

<!-- Modal: add / edit persona -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add Reviewer</h3>
    <div>
      <label>Emoji</label>
      <input type="text" id="mEmoji" maxlength="2" placeholder="🤖" style="width:60px" />
    </div>
    <div>
      <label>Name</label>
      <input type="text" id="mName" placeholder="e.g. The Skeptic" />
    </div>
    <div>
      <label>Tagline (shown under the name)</label>
      <input type="text" id="mTagline" placeholder="e.g. Questions everything" />
    </div>
    <div>
      <label>System prompt (defines their personality)</label>
      <textarea id="mPrompt" style="min-height:120px" placeholder="You are a seasoned venture capitalist who has seen thousands of pitches…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="savePersona()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Default personas ───────────────────────────────────────────────────────
const DEFAULT_PERSONAS = [
  {
    id: 'devil',
    emoji: '😈',
    name: "The Devil's Advocate",
    tagline: 'Challenges every assumption',
    prompt: `You are a sharp, skeptical thinker who reviews documents by challenging every assumption, claim, and logical leap. Your job is to find the holes before anyone else does. Be direct but constructive. Bullet-point your key objections, then give one actionable suggestion for each.`,
  },
  {
    id: 'clarity',
    emoji: '🔍',
    name: 'The Clarity Coach',
    tagline: 'Readability & structure',
    prompt: `You are an expert editor focused entirely on clarity, flow, and structure. You cut jargon, flag confusing sentences, and ensure the document's message is immediately obvious. Give specific rewrite suggestions, not vague advice.`,
  },
  {
    id: 'expert',
    emoji: '🎓',
    name: 'The Domain Expert',
    tagline: 'Accuracy & technical depth',
    prompt: `You are a highly credible domain expert reviewing for factual accuracy, appropriate depth, and professional standards. Call out anything that is oversimplified, exaggerated, or missing critical nuance. Rate the overall credibility out of 10 and explain why.`,
  },
  {
    id: 'user',
    emoji: '👤',
    name: 'The End User',
    tagline: 'Reacts as the target reader',
    prompt: `You are the target audience for this document — read it as a real person would for the first time. Note where you got confused, bored, convinced, or skeptical. Be honest and specific. What would make you more likely to act on or believe this document?`,
  },
  {
    id: 'grammar',
    emoji: '✍️',
    name: 'The Grammar Nazi',
    tagline: 'Ruthless language perfection',
    prompt: `You are an obsessive grammarian and language purist. You review documents with zero tolerance for grammatical errors, awkward phrasing, passive voice abuse, dangling modifiers, punctuation mistakes, and inconsistent tense. Format your response as:

**Errors Found:** list every grammar/punctuation/spelling error with the original text and the corrected version.
**Style Issues:** flag passive voice, wordiness, and weak word choices.
**Verdict:** one-line overall language grade (A–F) with a brief reason.

Be precise and exhaustive. Do not skip minor issues.`,
  },
  {
    id: 'mba',
    emoji: '💼',
    name: 'The MBA Strategist',
    tagline: 'Product, market & cannibalization',
    trigger: 'product',
    triggerLabel: 'Activates on product content',
    prompt: `You are a sharp MBA-trained product strategist with deep experience in go-to-market, competitive analysis, and product portfolio management. When reviewing a document, you focus on:

1. **Competitive Landscape** — Who are the existing players? Does this product/idea compete with or cannibalize existing offerings (from the same company or ecosystem)?
2. **Market Positioning** — Is the positioning differentiated enough? What's the risk of being commoditized or outflanked?
3. **Cannibalization Risk** — Does this new product eat into an existing revenue stream? Is that intentional or a blind spot?
4. **Strategic Flaws** — What assumptions about the market or customer behavior are unvalidated?
5. **Recommendation** — One clear strategic pivot or action.

Be direct, use frameworks where helpful (Porter's Five Forces, Jobs-to-be-Done, etc.), and don't soften your critique.`,
  },
  {
    id: 'finance',
    emoji: '💰',
    name: 'The Finance Reviewer',
    tagline: 'Finds financial flaws & risks',
    trigger: 'finance',
    triggerLabel: 'Activates when numbers are involved',
    prompt: `You are a rigorous CFO-level finance reviewer. You scrutinize any document containing numbers, projections, costs, revenue, or financial claims. Your review covers:

1. **Number Sanity Check** — Are the figures internally consistent? Do the math. Flag any arithmetic errors or impossible numbers.
2. **Assumption Audit** — What growth rates, margins, or cost assumptions are baked in? Are they realistic or optimistic?
3. **Missing Metrics** — What key financial metrics are conspicuously absent (CAC, LTV, payback period, burn rate, gross margin)?
4. **Risk Exposure** — What financial scenarios could break this model? Downside case?
5. **Red Flags** — Any numbers that look cherry-picked, misleading, or designed to obscure bad performance?

Be specific about which numbers you're questioning and why. Show your work.`,
  },
];

// ── Trigger keyword lists ──────────────────────────────────────────────────
const PRODUCT_KEYWORDS = [
  'product', 'launch', 'market', 'competitor', 'roadmap', 'feature', 'go-to-market',
  'gtm', 'cannibali', 'mvp', 'strategy', 'positioning', 'segment', 'customer journey',
  'use case', 'user story', 'persona', 'pricing tier', 'differenti', 'value prop',
  'product-market', 'competitive', 'incumbent', 'disruption', 'beachhead',
];
const FINANCE_KEYWORDS = [
  'revenue', 'cost', 'profit', 'margin', 'roi', 'ebitda', 'budget', 'forecast',
  'arr', 'mrr', 'arpu', 'cac', 'ltv', 'burn', 'runway', 'valuation', 'funding',
  'payback', 'churn', 'gross margin', 'net margin', 'capex', 'opex', 'cogs',
  'million', 'billion', 'thousand', 'pricing', 'subscription', 'deal size',
];
const FINANCE_REGEX = /\$[\d,]+|[\d,]+%|\d+[xX]\s/;

function detectTriggers(doc) {
  const lower = doc.toLowerCase();
  const hasProduct = PRODUCT_KEYWORDS.some(k => lower.includes(k));
  const hasFinance  = FINANCE_KEYWORDS.some(k => lower.includes(k)) || FINANCE_REGEX.test(doc);
  return { product: hasProduct, finance: hasFinance };
}

// ── State ──────────────────────────────────────────────────────────────────
function loadPersonas() {
  const stored = JSON.parse(localStorage.getItem('panel_personas') || 'null');
  if (!stored) return DEFAULT_PERSONAS.map(p => ({ ...p }));
  // Merge in any new default personas not yet in storage
  const missing = DEFAULT_PERSONAS.filter(d => !stored.find(s => s.id === d.id));
  return [...stored, ...missing];
}

let personas  = loadPersonas();
let editingId = null;

function savePersonas() { localStorage.setItem('panel_personas', JSON.stringify(personas)); }

// ── API key ────────────────────────────────────────────────────────────────
function saveKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (val) sessionStorage.setItem('panel_key', val);
  else sessionStorage.removeItem('panel_key');
  const status = document.getElementById('apiStatus');
  if (!val)                    { status.textContent = 'Enter your key to begin'; status.className = 'api-status'; }
  else if (val.startsWith('sk-ant-')) { status.textContent = '✓ Ready';           status.className = 'api-status ok'; }
  else                         { status.textContent = 'Unexpected key format';    status.className = 'api-status'; }
}

function getKey() { return sessionStorage.getItem('panel_key') || ''; }

// ── Trigger detection & hints ──────────────────────────────────────────────
function onDocChange() {
  const doc = document.getElementById('docInput').value;
  const triggers = detectTriggers(doc);
  updateTriggerBadges(triggers);

  const hints = [];
  if (triggers.product) hints.push('💼 Product content detected — MBA Strategist will run');
  if (triggers.finance)  hints.push('💰 Numbers detected — Finance Reviewer will run');
  document.getElementById('triggerHints').textContent = hints.join('  ·  ');
}

function updateTriggerBadges(triggers) {
  personas.forEach(p => {
    const badge = document.getElementById('trigger-' + p.id);
    if (!badge) return;
    if (p.trigger === 'product') {
      badge.textContent  = triggers.product ? '✓ Will activate' : 'Waiting for product content';
      badge.className    = 'trigger-badge' + (triggers.product ? ' active' : '');
    } else if (p.trigger === 'finance') {
      badge.textContent  = triggers.finance ? '✓ Will activate' : 'Waiting for numbers';
      badge.className    = 'trigger-badge' + (triggers.finance ? ' active' : '');
    }
  });
}

// ── Render personas ────────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('personasList');
  list.innerHTML = '';
  personas.forEach(p => {
    const hasTrigger = !!p.trigger;
    const card = document.createElement('div');
    card.className = 'persona-review-card' + (hasTrigger ? ' smart-trigger' : '');
    card.id = 'card-' + p.id;

    const triggerBadgeHtml = hasTrigger
      ? `<span class="trigger-badge" id="trigger-${p.id}">${p.triggerLabel || 'Smart activate'}</span>`
      : '';

    card.innerHTML = `
      <div class="persona-header" onclick="toggleCard('${p.id}')">
        <span class="persona-icon">${p.emoji}</span>
        <div class="persona-info">
          <h3>${p.name}</h3>
          <p>${p.tagline}</p>
          ${triggerBadgeHtml}
        </div>
        <button class="persona-run-btn" id="btn-${p.id}" onclick="event.stopPropagation(); runOne('${p.id}')">Review →</button>
        <button class="persona-run-btn" style="margin-left:4px;color:#888" onclick="event.stopPropagation(); editPersona('${p.id}')">edit</button>
        <button class="persona-run-btn" style="margin-left:4px;color:#e05" onclick="event.stopPropagation(); deletePersona('${p.id}')">✕</button>
      </div>
      <div class="persona-response" id="resp-${p.id}"></div>
    `;
    list.appendChild(card);
  });

  // Re-evaluate triggers based on current doc
  const doc = document.getElementById('docInput').value;
  if (doc) updateTriggerBadges(detectTriggers(doc));
}

function toggleCard(id) {
  const resp = document.getElementById('resp-' + id);
  if (resp.textContent) resp.classList.toggle('visible');
}

// ── Environment detection ──────────────────────────────────────────────────
// On Vercel: use /api/claude (server holds the key)
// On GitHub Pages / localhost with no server key: call Anthropic directly
const IS_VERCEL = !window.location.hostname.includes('github.io')
               && window.location.hostname !== 'localhost'
               && window.location.hostname !== '127.0.0.1';

// ── Call Claude ────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userDoc) {
  if (IS_VERCEL) {
    // Server-side proxy — API key lives in Vercel env vars
    const body = { system: systemPrompt, document: userDoc };
    const key  = getKey();
    if (key) body.apiKey = key; // allow override if user pastes their own

    const res = await fetch('/api/claude', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    return (await res.json()).text;

  } else {
    // Direct browser → Anthropic (GitHub Pages / local without server)
    const key = getKey();
    if (!key) throw new Error('No API key — enter your Anthropic key at the top.');

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:  'POST',
      headers: {
        'x-api-key':                                 key,
        'anthropic-version':                         '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type':                              'application/json',
      },
      body: JSON.stringify({
        model:    'claude-opus-4-7',
        max_tokens: 1024,
        system:   systemPrompt,
        messages: [{ role: 'user', content: `Please review the following document:\n\n${userDoc}` }],
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    return (await res.json()).content[0].text;
  }
}

// ── Run one ────────────────────────────────────────────────────────────────
async function runOne(id) {
  const doc = document.getElementById('docInput').value.trim();
  if (!doc) { alert('Please paste a document first.'); return; }

  const persona = personas.find(p => p.id === id);
  const resp = document.getElementById('resp-' + id);
  const btn  = document.getElementById('btn-' + id);

  btn.disabled = true;
  btn.textContent = '…';
  resp.className = 'persona-response visible loading';
  resp.textContent = `${persona.emoji} ${persona.name} is reading your document…`;

  try {
    const text = await callClaude(persona.prompt, doc);
    resp.className = 'persona-response visible';
    resp.textContent = text;
  } catch (e) {
    resp.className = 'persona-response visible';
    resp.textContent = `Error: ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Review →';
  }
}

// ── Run all (respects smart triggers) ─────────────────────────────────────
async function runAll() {
  const doc = document.getElementById('docInput').value.trim();
  if (!doc) { alert('Please paste a document first.'); return; }

  const triggers = detectTriggers(doc);
  const toRun = personas.filter(p => {
    if (!p.trigger) return true;
    if (p.trigger === 'product') return triggers.product;
    if (p.trigger === 'finance')  return triggers.finance;
    return false;
  });

  document.getElementById('runAllBtn').disabled = true;
  await Promise.all(toRun.map(p => runOne(p.id)));
  document.getElementById('runAllBtn').disabled = false;
}

function clearAll() {
  document.querySelectorAll('.persona-response').forEach(el => {
    el.className = 'persona-response';
    el.textContent = '';
  });
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Reviewer' : 'Add Reviewer';
  if (id) {
    const p = personas.find(x => x.id === id);
    document.getElementById('mEmoji').value   = p.emoji;
    document.getElementById('mName').value    = p.name;
    document.getElementById('mTagline').value = p.tagline;
    document.getElementById('mPrompt').value  = p.prompt;
  } else {
    ['mEmoji','mName','mTagline','mPrompt'].forEach(id => document.getElementById(id).value = '');
  }
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

function savePersona() {
  const emoji   = document.getElementById('mEmoji').value.trim()   || '🤖';
  const name    = document.getElementById('mName').value.trim();
  const tagline = document.getElementById('mTagline').value.trim();
  const prompt  = document.getElementById('mPrompt').value.trim();
  if (!name || !prompt) { alert('Name and system prompt are required.'); return; }

  if (editingId) {
    const p = personas.find(x => x.id === editingId);
    Object.assign(p, { emoji, name, tagline, prompt });
  } else {
    personas.push({ id: 'p' + Date.now(), emoji, name, tagline, prompt });
  }
  savePersonas();
  render();
  closeModal();
}

function editPersona(id) { openModal(id); }

function deletePersona(id) {
  if (!confirm('Remove this reviewer?')) return;
  personas = personas.filter(p => p.id !== id);
  savePersonas();
  render();
}

// ── Init ──────────────────────────────────────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

if (IS_VERCEL) {
  document.getElementById('apiBar').style.display       = 'none';
  document.getElementById('hostedBanner').style.display = 'flex';
} else {
  const savedKey = sessionStorage.getItem('panel_key') || '';
  if (savedKey) { document.getElementById('apiKey').value = savedKey; saveKey(); }
}

render();
</script>
</body>
</html>
